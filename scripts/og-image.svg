<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0A0A0A"/>
      <stop offset="1" stop-color="#141414"/>
    </linearGradient>
    <linearGradient id="goldLine" x1="0" y1="0" x2="400" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#D4AF37" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#D4AF37"/>
      <stop offset="1" stop-color="#D4AF37" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="80" y="80" width="1040" height="470" rx="32" stroke="#D4AF37" stroke-opacity="0.18" stroke-width="1.5" fill="none"/>
  <line x1="200" y1="520" x2="1000" y2="520" stroke="url(#goldLine)" stroke-width="1"/>

  <!-- Decorative accents -->
  <circle cx="1050" cy="120" r="120" fill="#D4AF37" fill-opacity="0.04"/>
  <circle cx="150" cy="500" r="80" fill="#D4AF37" fill-opacity="0.03"/>

  <!-- Logo mark -->
  <rect x="120" y="140" width="88" height="88" rx="20" stroke="#D4AF37" stroke-width="2" fill="#111111"/>
  <text x="164" y="202" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="42" font-weight="700" fill="#D4AF37" letter-spacing="-3">DC</text>

  <!-- Brand name -->
  <text x="230" y="178" font-family="Inter, Arial, sans-serif" font-size="42" font-weight="600" fill="#FFFFFF" letter-spacing="-1.5">DANAWANGSA</text>
  <text x="230" y="210" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="500" fill="#D4AF37" letter-spacing="5">CAPITAL</text>

  <!-- Hero headline -->
  <text x="120" y="310" font-family="Georgia, 'Times New Roman', serif" font-size="64" font-weight="700" fill="#FFFFFF" letter-spacing="-2">TURNING ASSETS</text>
  <text x="120" y="385" font-family="Georgia, 'Times New Roman', serif" font-size="64" font-weight="700" fill="#D4AF37" letter-spacing="-2">INTO OPPORTUNITIES</text>

  <!-- Tagline -->
  <text x="120" y="450" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="500" fill="#FFFFFF" fill-opacity="0.75">Strategic Business &amp; Financial Advisory</text>

  <!-- Positioning note -->
  <text x="120" y="495" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="400" fill="#D4AF37" fill-opacity="0.85">Strategic Business &amp; Financial Consultant</text>

  <!-- Footer badge -->
  <rect x="120" y="540" width="290" height="36" rx="18" fill="#D4AF37" fill-opacity="0.1" stroke="#D4AF37" stroke-opacity="0.35"/>
  <text x="265" y="563" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="600" fill="#D4AF37" letter-spacing="1.5">JADWALKAN KONSULTASI GRATIS</text>
</svg>